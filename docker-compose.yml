services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # Substitute ${DOMAIN} in template, then start nginx with 24h reload loop for cert renewal
    command: "/bin/sh -c 'envsubst \"$${DOMAIN}\" < /etc/nginx/templates/nginx.conf.template > /etc/nginx/conf.d/default.conf && while :; do sleep 24h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Check for renewal every 12h; only renews when cert is <30 days from expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://trading:trading@postgres:5432/trading
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      FMP_API_KEY: ${FMP_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: on-failure

volumes:
  postgres_data:
  certbot_certs:
  certbot_www:
